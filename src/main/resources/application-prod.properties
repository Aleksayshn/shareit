spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Render must provide these environment variables. APP_SECURITY_JWT_EXPIRATION
# should use Spring's Duration format, for example 24h or PT24H.
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.expiration=${APP_SECURITY_JWT_EXPIRATION}

logging.level.org.springframework.transaction.interceptor=INFO
logging.level.org.springframework.orm.jpa.JpaTransactionManager=INFO
logging.level.org.springframework.jdbc.datasource.init=INFO
