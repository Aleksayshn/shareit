services:
  - type: web
    name: shareit-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    healthCheckPath: /actuator/health
    maxShutdownDelaySeconds: 60
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: APP_SECURITY_JWT_SECRET
        sync: false
      - key: APP_SECURITY_JWT_EXPIRATION
        sync: false
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=75.0
